<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Analysis</title>

  <script src="https://s3.tradingview.com/tv.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0a0e1a;
      --bg-secondary: #111827;
      --bg-tertiary: #1a1f2e;
      --bg-glass: rgba(17, 24, 39, 0.8);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-primary: #f9fafb;
      --text-secondary: #9ca3af;
      --accent-green: #10b981;
      --accent-red: #ef4444;
      --accent-blue: #3b82f6;
      --accent-purple: #8b5cf6;
      --accent-cyan: #06b6d4;
      --glow-green: rgba(16, 185, 129, 0.3);
      --glow-red: rgba(239, 68, 68, 0.3);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background:
        radial-gradient(ellipse at top, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at bottom right, rgba(139, 92, 246, 0.1) 0%, transparent 50%),
        var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated background mesh */
    .bg-mesh {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
      background-image:
        linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
    }

    /* Header */
    .header {
      position: relative;
      z-index: 10;
      padding: 16px 24px;
      background: var(--bg-glass);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      transition: color 0.2s;
    }

    .back-btn:hover {
      color: var(--text-primary);
    }

    .ticker-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .ticker-logo {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
      box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
    }

    .ticker-details h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .ticker-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .status-badge {
      padding: 4px 10px;
      background: rgba(16, 185, 129, 0.15);
      color: var(--accent-green);
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      border: 1px solid rgba(16, 185, 129, 0.3);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.7;
      }
    }

    .price-display {
      text-align: right;
    }

    .current-price {
      font-size: 32px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
    }

    .price-change {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 4px;
      font-size: 14px;
    }

    .positive {
      color: var(--accent-green);
    }

    .negative {
      color: var(--accent-red);
    }

    /* Main Layout */
    .container {
      position: relative;
      z-index: 5;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 16px;
      padding: 16px;
      max-width: 1920px;
      margin: 0 auto;
    }

    /* Glass Cards */
    .glass-card {
      background: var(--bg-glass);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 20px;
      box-shadow:
        0 4px 6px -1px rgba(0, 0, 0, 0.3),
        0 2px 4px -1px rgba(0, 0, 0, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .glass-card:hover {
      box-shadow:
        0 10px 15px -3px rgba(0, 0, 0, 0.4),
        0 4px 6px -2px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
      transition: all 0.2s;
    }

    .stat-card:hover {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .stat-sub {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* Chart Container */
    .chart-section {
      position: relative;
    }

    .chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .timeframe-selector {
      display: flex;
      gap: 4px;
      background: rgba(0, 0, 0, 0.3);
      padding: 4px;
      border-radius: 10px;
    }

    .tf-btn {
      padding: 6px 14px;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 500;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tf-btn:hover {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.05);
    }

    .tf-btn.active {
      background: var(--accent-blue);
      color: white;
      box-shadow: 0 2px 8px rgba(59, 130, 246, 0.4);
    }


    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f0f13;
      --bg2: #17171d;
      --surface: #1e1e26;
      --border: #2a2a36;
      --text: #f0eeff;
      --text2: #9896b0;
      --text3: #5e5c72;
      --green: #22d17a;
      --red: #f25757;
      --blue: #5b8af5;
      --radius: 10px;
      --radius-lg: 14px;
    }

    html {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      padding: 32px 20px 60px;
    }

    .page {
      max-width: 1100px;
      margin: auto;
    }

    .back {
      display: inline-flex;
      gap: 6px;
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 28px;
      text-decoration: none;
      cursor: pointer;
    }

    .back:hover {
      color: var(--text);
    }

    .header {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 24px;
    }

    .header-left {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .logo-circle {
      width: 54px;
      height: 54px;
      border-radius: 14px;
      background: #0f2044;
      border: 1px solid #1d3a70;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--blue);
      font-weight: 700;
    }

    .company-name {
      font-size: 22px;
      font-weight: 700;
    }

    .company-sub {
      margin-top: 4px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    .tag {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 5px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text2);
    }

    .price-main {
      font-size: 30px;
      font-weight: 700;
      color: var(--green);
    }

    .price-change {
      font-size: 13px;
      margin-top: 4px;
    }

    .price-change.neg {
      color: var(--red);
    }

    .live-indicator {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--green);
      font-weight: 600;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    .metrics-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .metric-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
    }

    .metric-label {
      font-size: 10px;
      color: var(--text3);
      text-transform: uppercase;
    }

    .metric-val {
      font-size: 18px;
      font-weight: 700;
      margin-top: 6px;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 16px;
    }

    .col-right {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
    }

    #tv_chart_container {
      width: 100%;
      height: 400px;
    }

    .fund-row {
      display: flex;
      justify-content: space-between;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }

    .fund-row:last-child {
      border-bottom: none;
    }

    .btn-primary {
      width: 100%;
      padding: 13px;
      border-radius: var(--radius);
      background: var(--green);
      color: #0a1a0f;
      font-weight: 700;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 15px;
    }

    .btn-primary:hover {
      filter: brightness(1.1);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .last-updated {
      font-size: 11px;
      color: var(--text3);
      text-align: center;
      margin-top: 8px;
    }

    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, .3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .error-message {
      color: var(--red);
      font-size: 14px;
      text-align: center;
      padding: 20px;
    }

    @media (max-width: 820px) {
      .two-col {
        grid-template-columns: 1fr;
      }

      .metrics-row {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 20px 14px;
      }

      .price-main {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <a class="back" onclick="goBack()">← Back</a>

    <div class="header">
      <div class="header-left">
        <div class="logo-circle" id="logoCircle">--</div>
        <div>
          <div class="company-name" id="companyName">
            <span class="loading"></span> Loading...
          </div>
          <div class="company-sub">
            <span class="tag" id="symbolTag">--</span>
            <span class="tag" id="marketStatus">Checking...</span>
            <span class="live-indicator" id="liveIndicator" style="display:none;">
              <span class="live-dot"></span>LIVE
            </span>
          </div>
        </div>
      </div>

      <div class="price-block">
        <div class="price-main" id="mPrice">₹--</div>
        <div class="price-change" id="priceChange">--</div>
      </div>
    </div>

    <div class="metrics-row">
      <div class="metric-card">
        <div class="metric-label">Market Cap</div>
        <div id="mCap" class="metric-val">--</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">52W High</div>
        <div id="wHigh" class="metric-val">--</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">52W Low</div>
        <div id="wLow" class="metric-val">--</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">P/E Ratio</div>
        <div id="peRatio" class="metric-val">--</div>
      </div>
    </div>

    <div class="two-col">
      <div>
        <div class="card" style="padding:0;">
          <div id="tv_chart_container"></div>
        </div>
      </div>

      <div class="col-right">
        <div class="card">
          <div style="margin-bottom: 12px; font-weight: bold;">Fundamentals</div>
          <div class="fund-row"><span>Dividend Yield</span><span id="divYield">--</span></div>
          <div class="fund-row"><span>EPS</span><span id="eps">--</span></div>
          <div class="fund-row"><span>Exchange</span><span id="exchange">--</span></div>
          <div class="fund-row"><span>Volume</span><span id="volume">--</span></div>
          <div class="fund-row"><span>Day High</span><span id="dayHigh">--</span></div>
          <div class="fund-row"><span>Day Low</span><span id="dayLow">--</span></div>
        </div>

        <button class="btn-primary" id="analysisBtn" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
          </svg>
          Run AI Deep Analysis
        </button>
        <div class="last-updated" id="lastUpdated">Loading data...</div>
      </div>
    </div>
  </div>

  <script>
    // ==========================================
    // STOCK ANALYSIS APP - MULTI-STOCK SUPPORT
    // ==========================================

    let currentSymbol = '';
    let updateInterval = null;
    let chartWidget = null;
    let isMarketOpen = false;

    // ==========================================
    // INITIALIZATION
    // ==========================================

    function init() {
      // Get symbol from URL
      const urlParams = new URLSearchParams(window.location.search);
      const symbolFromURL = urlParams.get('symbol');

      // Reset everything first
      resetUI();

      // Validate symbol
      if (!symbolFromURL || symbolFromURL.trim() === '') {
        console.error("No symbol provided in URL");
        showError("No stock symbol provided. Please select a stock from the list.");
        return;
      }

      currentSymbol = symbolFromURL.toUpperCase().trim().replace('.NS', '').replace('.BO', '');
      const ticker = currentSymbol + ".NS";

      console.log("🚀 Loading stock:", currentSymbol);

      // Update immediate UI
      document.getElementById('symbolTag').innerText = ticker;
      document.getElementById('logoCircle').innerText = currentSymbol.substring(0, 2);

      // Initialize Chart
      initChart(currentSymbol);

      // Fetch data
      fetchStockData(ticker);

      // Setup updates
      startRealTimeUpdates(ticker);

      // Setup button
      setupButton();
    }

    function resetUI() {
      // Clear any existing intervals
      if (updateInterval) {
        clearInterval(updateInterval);
        updateInterval = null;
      }

      // Reset all fields
      document.getElementById('companyName').innerHTML = '<span class="loading"></span> Loading...';
      document.getElementById('mPrice').innerText = '₹--';
      document.getElementById('priceChange').innerText = '--';
      document.getElementById('priceChange').style.color = 'var(--text2)';
      document.getElementById('marketStatus').innerText = 'Checking...';
      document.getElementById('liveIndicator').style.display = 'none';
      document.getElementById('lastUpdated').innerText = 'Loading data...';

      // Reset metrics
      ['mCap', 'wHigh', 'wLow', 'peRatio', 'divYield', 'eps', 'exchange', 'volume', 'dayHigh', 'dayLow'].forEach(id => {
        document.getElementById(id).innerText = '--';
      });

      // Clear chart container
      const chartContainer = document.getElementById('tv_chart_container');
      chartContainer.innerHTML = '';
    }

    function showError(message) {
      document.getElementById('companyName').innerHTML = `<span class="error-message">${message}</span>`;
      document.getElementById('analysisBtn').disabled = true;
    }

    // ==========================================
    // CHART INITIALIZATION
    // ==========================================

    function initChart(symbol) {
      try {
        // Remove existing chart if any
        const container = document.getElementById('tv_chart_container');
        container.innerHTML = '';

        chartWidget = new TradingView.widget({
          "container_id": "tv_chart_container",
          "width": "100%",
          "height": 400,
          "symbol": "NSE:" + symbol,
          "interval": "5", // 5 minute candles for better performance
          "timezone": "Asia/Kolkata",
          "theme": "dark",
          "style": "1",
          "locale": "en",
          "enable_publishing": false,
          "hide_top_toolbar": false,
          "allow_symbol_change": false,
          "save_image": false,
          "studies": ["RSI@tv-basicstudies", "MASimple@tv-basicstudies"]
        });

        console.log("📊 Chart initialized for:", symbol);
      } catch (e) {
        console.error("Chart error:", e);
      }
    }

    // ==========================================
    // DATA FETCHING
    // ==========================================

    async function fetchStockData(ticker) {
      console.log("📡 Fetching data for:", ticker);

      try {
        // Try Yahoo Finance first (more real-time)
        await fetchYahooData(ticker);
      } catch (error) {
        console.log("Yahoo failed, trying RapidAPI...");
        try {
          await fetchRapidAPIData(ticker);
        } catch (rapidError) {
          console.error("Both APIs failed:", rapidError);
          showError("Failed to load stock data. Please try again.");
        }
      }
    }

    async function fetchYahooData(ticker) {
      const proxy = "https://api.allorigins.win/get?url=";
      // Get both quote and chart data
      const quoteUrl = encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1m&range=1d&includePrePost=true`);

      const response = await fetch(proxy + quoteUrl);

      if (!response.ok) throw new Error("Network error: " + response.status);

      const proxyData = await response.json();

      if (!proxyData.contents) throw new Error("Empty proxy response");

      const data = JSON.parse(proxyData.contents);

      if (!data.chart || !data.chart.result || data.chart.result.length === 0) {
        throw new Error("No chart data available");
      }

      const result = data.chart.result[0];
      const meta = result.meta;

      // Check for errors
      if (data.chart.error) {
        throw new Error(data.chart.error.description);
      }

      // Get latest price data
      const quote = result.indicators?.quote?.[0];
      const timestamps = result.timestamp || [];
      const lastIndex = timestamps.length - 1;

      // Current price (use close of last candle or meta price)
      let currentPrice = meta.regularMarketPrice;
      let dayHigh = meta.regularMarketDayHigh;
      let dayLow = meta.regularMarketDayLow;
      let volume = meta.regularMarketVolume;

      // If we have candle data, use the latest
      if (quote && lastIndex >= 0) {
        if (quote.close && quote.close[lastIndex]) {
          currentPrice = quote.close[lastIndex];
        }
        if (quote.high) {
          const highs = quote.high.filter(x => x);
          if (highs.length) dayHigh = Math.max(...highs);
        }
        if (quote.low) {
          const lows = quote.low.filter(x => x);
          if (lows.length) dayLow = Math.min(...lows);
        }
        if (quote.volume) {
          volume = quote.volume.reduce((a, b) => a + (b || 0), 0);
        }
      }

      const previousClose = meta.previousClose || meta.chartPreviousClose || currentPrice;
      const change = currentPrice - previousClose;
      const changePercent = previousClose ? (change / previousClose) * 100 : 0;

      // Check market status
      checkMarketStatus(meta);

      // Update UI
      updatePriceUI({
        price: currentPrice,
        change: change,
        changePercent: changePercent,
        high: dayHigh,
        low: dayLow,
        volume: volume,
        previousClose: previousClose,
        timestamp: new Date()
      });

      // Update static data
      updateStaticData(meta, ticker);

      console.log("✅ Yahoo data loaded:", currentPrice);
    }

    async function fetchRapidAPIData(ticker) {
      const API_KEY = "fdc0e97274msh7f82b22f8971f6ep1ac4cfjsn7ee07a6c9862";
      const proxy = "https://api.allorigins.win/get?url=";
      const targetUrl = encodeURIComponent(`https://yahoo-finance15.p.rapidapi.com/api/v1/markets/quotes?ticker=${ticker}`);

      const response = await fetch(proxy + targetUrl);

      if (!response.ok) throw new Error("Proxy error: " + response.status);

      const proxyData = await response.json();

      if (!proxyData.contents) throw new Error("Empty response");

      const result = JSON.parse(proxyData.contents);

      if (!result || !result.body || result.body.length === 0) {
        throw new Error("No data in response");
      }

      const s = result.body[0];

      // Check if we got valid data
      if (!s.regularMarketPrice) {
        throw new Error("Invalid stock data received");
      }

      updatePriceUI({
        price: s.regularMarketPrice,
        change: s.regularMarketChange || 0,
        changePercent: s.regularMarketChangePercent || 0,
        high: s.regularMarketDayHigh || s.fiftyTwoWeekHigh,
        low: s.regularMarketDayLow || s.fiftyTwoWeekLow,
        volume: s.regularMarketVolume,
        previousClose: s.regularMarketPreviousClose,
        timestamp: new Date()
      });

      updateStaticData(s, ticker);

      // Check market status based on data timestamp
      const dataTime = new Date(s.regularMarketTime * 1000);
      const now = new Date();
      isMarketOpen = (now - dataTime) < 60000; // Within last minute

      updateMarketStatus();

      console.log("✅ RapidAPI data loaded");
    }

    // ==========================================
    // MARKET STATUS
    // ==========================================

    function checkMarketStatus(meta) {
      const now = new Date();
      const istOffset = 330; // IST is UTC+5:30 in minutes
      const istTime = new Date(now.getTime() + (istOffset * 60 * 1000));

      const hours = istTime.getUTCHours();
      const minutes = istTime.getUTCMinutes();
      const day = istTime.getUTCDay(); // 0=Sun, 1=Mon, ..., 6=Sat

      // Market hours: 9:15 AM - 3:30 PM IST, Mon-Fri
      const marketStart = 9 * 60 + 15; // 9:15 AM in minutes
      const marketEnd = 15 * 60 + 30;  // 3:30 PM in minutes
      const currentTime = hours * 60 + minutes;

      isMarketOpen = (day >= 1 && day <= 5) && (currentTime >= marketStart && currentTime <= marketEnd);

      updateMarketStatus();
    }

    function updateMarketStatus() {
      const statusEl = document.getElementById('marketStatus');
      const liveEl = document.getElementById('liveIndicator');

      if (isMarketOpen) {
        statusEl.innerText = "Market Open";
        statusEl.style.background = "rgba(34, 209, 122, 0.2)";
        statusEl.style.color = "var(--green)";
        statusEl.style.border = "1px solid var(--green)";
        liveEl.style.display = "inline-flex";
      } else {
        statusEl.innerText = "Market Closed";
        statusEl.style.background = "var(--surface)";
        statusEl.style.color = "var(--text2)";
        statusEl.style.border = "1px solid var(--border)";
        liveEl.style.display = "none";
      }
    }

    // ==========================================
    // UI UPDATES
    // ==========================================

    function updatePriceUI(data) {
      // Price with animation effect
      const priceEl = document.getElementById('mPrice');
      const oldPrice = parseFloat(priceEl.innerText.replace(/[₹,]/g, '')) || 0;
      const newPrice = data.price;

      priceEl.innerText = "₹" + newPrice.toLocaleString('en-IN', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });

      // Flash effect on price change
      if (oldPrice !== 0 && oldPrice !== newPrice) {
        priceEl.style.transition = "color 0.3s";
        priceEl.style.color = newPrice > oldPrice ? "var(--green)" : "var(--red)";
        setTimeout(() => {
          priceEl.style.color = newPrice >= data.previousClose ? "var(--green)" : "var(--red)";
        }, 500);
      }

      // Change
      const changeEl = document.getElementById('priceChange');
      const isPositive = data.change >= 0;
      changeEl.innerText = `${isPositive ? '+' : ''}${data.change.toFixed(2)} (${data.changePercent.toFixed(2)}%)`;
      changeEl.style.color = isPositive ? "var(--green)" : "var(--red)";
      changeEl.classList.toggle('neg', !isPositive);

      // Day stats
      document.getElementById('dayHigh').innerText = data.high ? "₹" + data.high.toFixed(2) : "--";
      document.getElementById('dayLow').innerText = data.low ? "₹" + data.low.toFixed(2) : "--";
      document.getElementById('volume').innerText = data.volume ? formatVolume(data.volume) : "--";

      // Last updated
      const timeStr = data.timestamp.toLocaleTimeString('en-IN');
      document.getElementById('lastUpdated').innerText = `Last updated: ${timeStr}`;

      // Enable button
      document.getElementById('analysisBtn').disabled = false;
    }

    function updateStaticData(data, ticker) {
      // Company info
      const name = data.longName || data.shortName || data.symbol || currentSymbol;
      document.getElementById('companyName').innerText = name;
      document.getElementById('symbolTag').innerText = ticker;

      // 52W stats
      const weekHigh = data.fiftyTwoWeekHigh || data.fiftyTwoWeekHighChange || data.regularMarketDayHigh;
      const weekLow = data.fiftyTwoWeekLow || data.fiftyTwoWeekLowChange || data.regularMarketDayLow;

      document.getElementById('wHigh').innerText = weekHigh ? "₹" + parseFloat(weekHigh).toFixed(2) : "--";
      document.getElementById('wLow').innerText = weekLow ? "₹" + parseFloat(weekLow).toFixed(2) : "--";

      // P/E
      document.getElementById('peRatio').innerText = data.trailingPE ? data.trailingPE.toFixed(2) :
        data.forwardPE ? data.forwardPE.toFixed(2) : "--";

      // Market Cap
      const mCap = data.marketCap;
      document.getElementById('mCap').innerText = mCap ? formatMarketCap(mCap) : "--";

      // Fundamentals
      document.getElementById('divYield').innerText = data.dividendYield ? (data.dividendYield * 100).toFixed(2) + "%" : "--";
      document.getElementById('eps').innerText = data.epsTrailingTwelveMonths || data.epsForward ?
        "₹" + parseFloat(data.epsTrailingTwelveMonths || data.epsForward).toFixed(2) : "--";
      document.getElementById('exchange').innerText = data.exchange || data.exchangeName || "NSE";
    }

    function formatVolume(num) {
      if (num >= 10000000) return (num / 10000000).toFixed(2) + " Cr";
      if (num >= 100000) return (num / 100000).toFixed(2) + " L";
      if (num >= 1000) return (num / 1000).toFixed(2) + " K";
      return num.toString();
    }

    function formatMarketCap(num) {
      if (num >= 1000000000000) return (num / 1000000000000).toFixed(2) + " T Cr";
      if (num >= 10000000) return (num / 10000000).toFixed(0) + " Cr";
      if (num >= 100000) return (num / 100000).toFixed(2) + " L";
      return num.toString();
    }

    // ==========================================
    // REAL-TIME UPDATES
    // ==========================================

    function startRealTimeUpdates(ticker) {
      // Clear existing interval
      if (updateInterval) clearInterval(updateInterval);

      // Update every 10 seconds (to avoid rate limits)
      updateInterval = setInterval(() => {
        if (isMarketOpen) {
          console.log("🔄 Auto-updating:", ticker);
          fetchStockData(ticker).catch(err => console.log("Update failed:", err));
        }
      }, 10000);

      console.log("⏱️ Updates started (10s interval)");
    }

    // ==========================================
    // NAVIGATION & BUTTONS
    // ==========================================

    function goBack() {
      // Clear interval before leaving
      if (updateInterval) clearInterval(updateInterval);
      window.location.href = 'index.html';
    }

    function setupButton() {
      const btn = document.getElementById('analysisBtn');

      // Remove existing listeners
      const newBtn = btn.cloneNode(true);
      btn.parentNode.replaceChild(newBtn, btn);

      newBtn.addEventListener('click', function () {
        const isLoggedIn = sessionStorage.getItem("isLoggedIn");

        if (isLoggedIn === "true") {
          window.location.href = `deepanalysis.html?symbol=${currentSymbol}`;
        } else {
          alert("🔒 This AI model requires a Pro login.");
          window.location.href = `login.html?redirect=${encodeURIComponent('analysis.html?symbol=' + currentSymbol)}`;
        }
      });
    }

    // ==========================================
    // START
    // ==========================================

    // Run on page load
    window.addEventListener('load', init);

    // Handle browser back/forward buttons (popstate)
    window.addEventListener('popstate', function () {
      console.log("🔄 Navigation detected, reloading...");
      init();
    });

    // Also check for URL changes (for SPAs)
    let lastUrl = location.href;
    new MutationObserver(() => {
      const url = location.href;
      if (url !== lastUrl) {
        lastUrl = url;
        console.log("🔗 URL changed to:", url);
        init();
      }
    }).observe(document, { subtree: true, childList: true });

    console.log("📈 Stock Analysis App Loaded");
  </script>
</body>
