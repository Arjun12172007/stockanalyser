<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Execute Trade — StockSense</title>
    <style>
        body { background: #0a0a0f; color: white; font-family: Arial; padding: 40px; }
        .buy-card { 
            background: #111118; border: 1px solid #2a2a38; 
            padding: 30px; border-radius: 16px; max-width: 400px; margin: auto; 
        }
        h2 { margin-bottom: 20px; color: #5b6af0; }
        input { 
            width: 100%; background: #1a1a24; border: 1px solid #2a2a38; 
            color: white; padding: 12px; border-radius: 8px; margin: 10px 0; 
        }
        .confirm-btn { 
            width: 100%; background: #22d17a; color: white; border: none; 
            padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px;
        }
    </style>
    <a href="index.html">Back to Home</a>
</head>
<body>
    <div class="buy-card">
        <h2>Confirm Order</h2>
        <p>Buying: <strong id="displayTicker">...</strong></p>
        <label>Quantity</label>
        <input type="number" id="qty" value="1" min="1">
        <label>Order Type</label>
        <input type="text" value="Market Order" disabled>
        <button class="confirm-btn" onclick="processTrade()">Confirm Trade</button>
    </div>

<script>
    // Extract the data from the URL (e.g., buypage.html?symbol=AAPL&price=150.00)
    const params = new URLSearchParams(window.location.search);
    const symbol = params.get('symbol') || 'NONE';
    const price = parseFloat(params.get('price')) || 0.00;

    // Update the UI text
    document.getElementById('displayTicker').innerText = symbol;
    document.getElementById('displayPrice').innerText = "$" + price.toFixed(2);

    // Simple math for the Total Cost
    function updateTotal() {
        const qty = document.getElementById('qty').value;
        const total = (price * qty).toFixed(2);
        document.getElementById('totalDisplay').innerText = "$" + total;
    }

    function processTrade() {
        const qty = document.getElementById('qty').value;
        alert(`Successfully purchased ${qty} shares of ${symbol}!`);
        window.location.href = 'index.html'; // Go back to main page
    }

    // Run once on page load to set the initial total
    updateTotal();
</script>
    </script>
</body>
</html>
